# 인증 불필요 (로그인 페이지)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
    - host: ai.seowoo.local
      http:
        paths:
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          - path: /validate
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80

---
# 인증 필요 (메인 서비스)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: secure-api-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/auth-url: "http://auth-service.default.svc.cluster.local/validate"
    nginx.ingress.kubernetes.io/auth-signin: "http://ai.seowoo.local:32564/login"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Auth-User "";
      proxy_set_header X-Auth-Role "";
      proxy_set_header X-Admin "";
spec:
  ingressClassName: nginx
  rules:
    - host: ai.seowoo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: secure-api
                port:
                  number: 80
          - path: /ask
            pathType: Prefix
            backend:
              service:
                name: secure-api
                port:
                  number: 8000

